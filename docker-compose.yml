services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      # - "8080:8080" # Traefik dashboard — uncomment only for local debugging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/acme
    networks:
      - wp-launcher-network
    labels:
      - "traefik.enable=false"

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 1
      BUILD: 1
    networks:
      - provisioner-internal

  provisioner:
    build: ./packages/provisioner
    restart: unless-stopped
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
      - DOCKER_API_VERSION=1.44
      - PORT=4000
      - INTERNAL_KEY=${PROVISIONER_INTERNAL_KEY:?Set PROVISIONER_INTERNAL_KEY in .env}
      - BASE_DOMAIN=${BASE_DOMAIN:-localhost}
      - DOCKER_NETWORK=wp-launcher-network
      - CONTAINER_MEMORY=${CONTAINER_MEMORY:-268435456}
      - CONTAINER_CPU=${CONTAINER_CPU:-0.5}
      - WP_UPLOAD_LIMIT=${WP_UPLOAD_LIMIT:-2097152}
      - WP_DISK_QUOTA=${WP_DISK_QUOTA:-104857600}
      - ENABLE_TLS=${ENABLE_TLS:-false}
      - CERT_RESOLVER=${CERT_RESOLVER:-letsencrypt}
    networks:
      - provisioner-internal
      - wp-launcher-network
    depends_on:
      - docker-proxy

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025" # Web UI
    networks:
      - wp-launcher-network

  api:
    build: ./packages/api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./products:/app/products:ro
      - ./templates:/app/templates:ro
      - ./wordpress:/app/wordpress:ro
    environment:
      - APP_MODE=${APP_MODE:-agency}
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
      - API_KEY=${API_KEY:?Set API_KEY in .env}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost}
      - PROVISIONER_URL=http://provisioner:4000
      - PROVISIONER_INTERNAL_KEY=${PROVISIONER_INTERNAL_KEY:?Set PROVISIONER_INTERNAL_KEY in .env}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-WP Launcher <noreply@localhost>}
      - BASE_DOMAIN=${BASE_DOMAIN:-localhost}
      - WP_IMAGE=${WP_IMAGE:-wp-launcher/wordpress:latest}
      - MAX_SITES_PER_USER=${MAX_SITES_PER_USER:-3}
      - CARD_LAYOUT=${CARD_LAYOUT:-full}
      - DATA_DIR=/app/data
      - PRODUCT_CONFIGS_DIR=/app/products
      - TEMPLATE_CONFIGS_DIR=/app/templates
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${BASE_DOMAIN:-localhost}`)"
      - "traefik.http.routers.api.middlewares=security-headers@file,rate-limit@file"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
    networks:
      - wp-launcher-network
    depends_on:
      traefik:
        condition: service_started
      mailpit:
        condition: service_started
        required: false
      provisioner:
        condition: service_started

  dashboard:
    build: ./packages/dashboard
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${BASE_DOMAIN:-localhost}`)"
      - "traefik.http.routers.dashboard.middlewares=security-headers@file"
      - "traefik.http.services.dashboard.loadbalancer.server.port=80"
    networks:
      - wp-launcher-network
    depends_on:
      - api

networks:
  wp-launcher-network:
    name: wp-launcher-network
    driver: bridge
  provisioner-internal:
    name: provisioner-internal
    driver: bridge
    internal: true

volumes:
  traefik-certs:
